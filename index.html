<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple API Client</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #252526;
            --text-color: #d4d4d4;
            --border-color: #3c3c3c;
            --accent-color: #0e639c;
            --accent-hover: #1177bb;
            --method-get: #4caf50;
            --method-post: #2196f3;
            --method-put: #ff9800;
            --method-delete: #f44336;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 1.2rem;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }
        .panel-left { border-right: 1px solid var(--border-color); }
        h2 { font-size: 1rem; margin-bottom: 10px; text-transform: uppercase; color: #858585; }
        .request-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        select, input, textarea, button {
            background-color: #3c3c3c;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        select:focus, input:focus, textarea:focus {
            outline: 1px solid var(--accent-color);
        }
        select { width: 110px; font-weight: bold; text-align: center; }
        input { flex: 1; }
        button {
            background-color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
            border: none;
            padding: 8px 20px;
        }
        button:hover { background-color: var(--accent-hover); }
        textarea {
            width: 100%;
            flex: 1;
            min-height: 120px;
            font-family: "Courier New", Courier, monospace;
            resize: vertical;
            margin-bottom: 15px;
        }
        .response-meta {
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            gap: 15px;
        }
        .status-badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .status-success { background-color: #2e7d32; color: #fff; }
        .status-error { background-color: #c62828; color: #fff; }
        
        #output {
            background-color: #2d2d2d;
            font-size: 0.9rem;
            resize: none;
            cursor: text;
        }
    </style>
</head>
<body>

    <header>🌐 Browser API Client</header>

    <div class="main-container">
        <!-- Request Panel -->
        <div class="panel panel-left">
            <h2>Request</h2>
            <div class="request-bar">
                <select id="method">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                </select>
                <input type="url" id="url" placeholder="https://example.com" value="https://typicode.com">
                <button id="send-btn">Send</button>
            </div>

            <h2>Headers (JSON format)</h2>
            <textarea id="headers" placeholder='{\n  "Content-Type": "application/json"\n}'></textarea>

            <h2>Body (JSON / Text)</h2>
            <textarea id="body" placeholder='{\n  "key": "value"\n}'></textarea>
        </div>

        <!-- Response Panel -->
        <div class="panel">
            <h2>Response</h2>
            <div class="response-meta">
                <div>Status: <span id="status">-</span></div>
                <div>Time: <span id="time">-</span></div>
            </div>
            <textarea id="output" readonly placeholder="// Response will be displayed here..."></textarea>
        </div>
    </div>

    <script>
        const outputEl = document.getElementById('output');

        // Auto-select text on focus
        outputEl.addEventListener('focus', () => {
            outputEl.select();
        });

        document.getElementById('send-btn').addEventListener('click', async () => {
            const url = document.getElementById('url').value;
            const method = document.getElementById('method').value;
            const headersInput = document.getElementById('headers').value.trim();
            const bodyInput = document.getElementById('body').value.trim();
            
            const statusEl = document.getElementById('status');
            const timeEl = document.getElementById('time');

            if (!url) {
                alert('Please enter a URL.');
                return;
            }

            // Reset UI
            outputEl.value = 'Sending request...';
            statusEl.textContent = '-';
            statusEl.className = '';
            timeEl.textContent = '-';

            // Parse Headers
            let headers = {};
            if (headersInput) {
                try {
                    headers = JSON.parse(headersInput);
                } catch (e) {
                    outputEl.value = `[Error] Invalid JSON format in Headers.\n${e.message}`;
                    return;
                }
            }

            // Build Options
            const options = { method, headers };
            if (['POST', 'PUT', 'DELETE'].includes(method) && bodyInput) {
                options.body = bodyInput;
            }

            const startTime = performance.now();

            try {
                // Fetch Request
                const response = await fetch(url, options);
                const endTime = performance.now();
                
                // Update Meta Info
                const duration = Math.round(endTime - startTime);
                timeEl.textContent = `${duration} ms`;
                statusEl.textContent = `${response.status} ${response.statusText}`;
                statusEl.className = 'status-badge ' + (response.ok ? 'status-success' : 'status-error');

                // Parse Response
                const contentType = response.headers.get('content-type');
                let resultText = '';
                
                if (contentType && contentType.includes('application/json')) {
                    const json = await response.json();
                    resultText = JSON.stringify(json, null, 2);
                } else {
                    resultText = await response.text();
                }

                outputEl.value = resultText;

            } catch (error) {
                const endTime = performance.now();
                timeEl.textContent = `${Math.round(endTime - startTime)} ms`;
                statusEl.textContent = 'Error';
                statusEl.className = 'status-badge status-error';
                
                outputEl.value = `[Network Error]\nFailed to send request.\n\nPossible Causes:\n1. The URL is incorrect.\n2. The server is not running.\n3. Blocked by CORS (Cross-Origin Resource Sharing) policy.\n\nDetails:\n${error.message}`;
            }
        });
    </script>
</body>
</html>
